# nginx → fcgiwrap → git-http-backend, gated by HTTP Basic auth.
# The auth realm covers BOTH info/refs and the upload-pack/receive-pack
# endpoints, so anonymous access is 401 for clone, fetch AND push — the same
# posture Gitea enforced for these private repos.
worker_processes 1;
error_log /dev/stderr warn;
pid /run/nginx/nginx.pid;

events { worker_connections 256; }

http {
  access_log /dev/stdout;
  sendfile on;
  # git packs are large — don't cap the request body (push) or buffer to disk.
  client_max_body_size 0;

  server {
    listen 80 default_server;
    server_name _;

    # http.receivepack/uploadpack are decided by git-http-backend; we just
    # need to forward everything under /<owner>/<repo>.git/ to the CGI.
    location ~ /.*\.git/ {
      auth_basic           "Cantila Git";
      auth_basic_user_file /etc/nginx/git.htpasswd;

      include              /etc/nginx/fastcgi_params;
      fastcgi_param        SCRIPT_FILENAME /usr/libexec/git-core/git-http-backend;
      fastcgi_param        GIT_HTTP_EXPORT_ALL "";
      fastcgi_param        GIT_PROJECT_ROOT  /srv/cantila-git;
      fastcgi_param        PATH_INFO         $uri;
      # Let git stream large responses (clone) without buffering.
      fastcgi_buffering    off;
      fastcgi_read_timeout 300s;
      fastcgi_pass         unix:/run/fcgiwrap.sock;
    }

    location = /healthz { return 200 "ok\n"; }
  }
}
